version: 2
updates:
  
  # Configuration for GitHub Actions workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily

  # Configuration for Python dependencies managed by uv
  - package-ecosystem: uv
    directory: /
    schedule:
      interval: daily

  # Configuration for Docker dependencies
  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      # Disable all pull requests for Docker dependencies
    open-pull-requests-limit: 0
